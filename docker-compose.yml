version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: losev-inci-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: losev_user
      POSTGRES_PASSWORD: losev_pass_123
      POSTGRES_DB: losev_inci
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U losev_user -d losev_inci' ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: losev-inci-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: losev-inci-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://losev_user:losev_pass_123@postgres:5432/losev_inci?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_PRIVATE_KEY=your-private-key-here
      - JWT_PUBLIC_KEY=your-public-key-here
      - JWT_ACCESS_EXPIRATION=1h
      - JWT_REFRESH_EXPIRATION=14d
      - ALLOWED_ORIGINS=http://localhost:8081,http://localhost:19006,exp://localhost:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/prisma:/app/prisma

volumes:
  postgres_data:
  redis_data:
