version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: losev-postgres-prod
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
      - /var/run/postgresql
    environment:
      POSTGRES_USER: ${DB_USER:-losev_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-losev_password}
      POSTGRES_DB: ${DB_NAME:-losev_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-losev_user} -d ${DB_NAME:-losev_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: losev-redis-prod
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - redis_prod_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-losev_redis_password}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: losev-backend-prod
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    environment:
      DATABASE_URL: postgresql://${DB_USER:-losev_user}:${DB_PASSWORD:-losev_password}@postgres:5432/${DB_NAME:-losev_db}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-losev_redis_password}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-it-in-prod}
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./mobile
      dockerfile: Dockerfile.web
    container_name: losev-frontend-prod
    restart: always
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    environment:
      EXPO_PUBLIC_API_URL: /api/v1
    depends_on:
      - backend

  proxy:
    image: nginx:stable-alpine
    container_name: losev-proxy-prod
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  db-backup:
    image: prodriguestr/postgres-backup-local:15
    container_name: losev-db-backup
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${DB_NAME:-losev_db}
      POSTGRES_USER: ${DB_USER:-losev_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-losev_password}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_prod_data:
  redis_prod_data:
